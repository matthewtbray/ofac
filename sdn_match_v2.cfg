[MatchTypeScores]
Direct            = 4
Jaro-Winkler      = 3
Edit Distance     = 2
Double-Metaphone  = 2
NYSIIS            = 2
Soundex           = 1

[Normalization]
# Characters to preserve during punctuation stripping (besides alphanumeric and spaces)
keep_chars = -#

[Matching]
# Set to true to use Soundex, Double-Metaphone, and NYSIIS for candidate lookup
# and to generate phonetic method rows in output.  Default false (Direct only).
use_phonetic = false

[AddressMatch]
# Minimum Jaro-Winkler similarity for address word-index candidate inclusion
min_jw_similarity = 0.70

# Maximum number of SDN address candidates to compare per input record
max_addr_candidates = 50

[IndividualMatch]
# Both FirstName and LastName JaroWinkler similarity must meet this threshold
# for Personal_Name_Match to be set to 1 in MatchingResults_Full and MatchingResults_AKA.
# Scores are stored as 0-100 percentages; this threshold is expressed as 0-1.
JaroWinklerMatchThreshold = 0.85

[OrgNameMatch]
# Minimum Jaro-Winkler similarity for a word pair to count as a word match (sdnEntry)
JaroWinklerMatchThreshold = 0.85

# Minimum edit-distance similarity for a word pair to count as a word match (sdnEntry)
EditDistanceMatchThreshold = 0.85

# Same thresholds for akaList Entity comparisons
JaroWinklerMatchThreshold_AKA = 0.85
EditDistanceMatchThreshold_AKA = 0.5
